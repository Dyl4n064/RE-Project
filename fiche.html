<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Dossier Agent</title></head>
<body>
    <div class="container">
        <h1 id="f_nom">Chargement...</h1>
        <div class="profile-layout">
            <aside class="infobox"><img id="f_img" style="width:100%"><div id="f_details" class="data-scan"></div></aside>
            <main><h3>RAPPORT D'ACTIVITÉ</h3><p id="f_histoire"></p></main>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function chargerFiche() {
            const id = new URLSearchParams(window.location.search).get('id');
            const { data: p } = await supabase.from('personnages').select('*').eq('id', id).single();
            document.getElementById('f_nom').innerText = p.nom;
            document.getElementById('f_img').src = "images/" + p.image_url;
            document.getElementById('f_histoire').innerText = p.histoire_complete;
            document.getElementById('f_details').innerHTML = `<p>SURNOM: ${p.surnom}</p><p>ESPÈCE: ${p.espece}</p><p>AFFILIATION: ${p.affiliations}</p>`;
        }
        chargerFiche();
    </script>
</body>
</html>
