<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Registre Central</title></head>
<body>
    <div class="container">
        <h1>REGISTRE DES SUJETS</h1>
        <div class="roster-grid" id="grille-dynamique">Chargement...</div>
    </div>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function chargerRoster() {
            const { data: p } = await supabase.from('personnages').select('*');
            document.getElementById('grille-dynamique').innerHTML = p.map(perso => {
                const isDead = perso.statut.toLowerCase().includes('décédé');
                return `<a href="fiche.html?id=${perso.id}" class="card ${isDead ? 'status-decédé' : ''}">
                    <img src="images/${perso.image_url}" style="width:100%; height:200px; object-fit:cover;">
                    <h3>${perso.nom}</h3>
                    <p>STATUT: ${perso.statut}</p>
                </a>`;
            }).join('');
        }
        chargerRoster();
    </script>
</body>
</html>
