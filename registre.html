<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Base de données</title>
</head>
<body>
    <div class="container" style="text-align: center;">
        <h1>SYSTÈME CENTRAL</h1>
        
        <h2 style="margin-top: 10px; color: var(--text-color);">> BIENVENUE, AGENT_</h2>
        <p style="color: var(--accent-color); font-weight: bold; margin-bottom: 25px;" id="horloge">CALCUL DU TEMPS...</p>
        
        <p>Connexion sécurisée établie avec la base de données distante.</p>
        
        <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <a href="personnages.html" class="card" style="width: 200px;">ACCÉDER AU REGISTRE</a>
            <a href="create.html" class="card" style="width: 200px;">NOUVEL ENREGISTREMENT</a>

            <a href="souches.html" class="card" style="width: 200px;">BASE PATHOGÈNES</a>
            <a href="create_souche.html" class="card" style="width: 200px;">NOUVEAU PATHOGÈNE</a>
        </div>
    </div>

    <script>
        function majHorloge() {
            const horlogeElement = document.getElementById('horloge');
            const maintenant = new Date();
            
            // Formatage de la date et de l'heure à la française
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            
            // Récupère la date et met la première lettre en majuscule
            let dateTexte = maintenant.toLocaleDateString('fr-FR', options);
            dateTexte = dateTexte.toUpperCase(); // On met tout en majuscules pour le style Terminal
            
            // Affiche l'heure avec les millisecondes (optionnel, mais ça fait très "ordinateur")
            horlogeElement.innerText = "HORODATAGE SYSTÈME : " + dateTexte;
        }

        // Lancer l'horloge tout de suite, puis la rafraîchir toutes les 1000 millisecondes (1 seconde)
        majHorloge();
        setInterval(majHorloge, 1000);
    </script>
</body>
</html>
