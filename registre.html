<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Base de données</title>
</head>
<body>
    <div class="container" style="text-align: center;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="margin: 0; font-size: 1.1em; color: var(--text-color);">> BIENVENUE, AGENT_</h2>
            <p id="horloge" style="margin: 0; color: var(--accent-color); font-weight: bold; font-size: 0.9em;">CALCUL DU TEMPS...</p>
        </div>

        <h1>SYSTÈME CENTRAL</h1>
        <p>Connexion sécurisée établie avec la base de données distante.</p>
        
        <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <a href="personnages.html" class="card" style="width: 200px;">ACCÉDER AU REGISTRE</a>
            <a href="create.html" class="card" style="width: 200px;">NOUVEL ENREGISTREMENT</a>

            <a href="souches.html" class="card" style="width: 200px;">BASE PATHOGÈNES</a>
            <a href="create_souche.html" class="card" style="width: 200px;">NOUVEAU PATHOGÈNE</a>
        </div>
    </div>

    <script>
        function majHorloge() {
            const horlogeElement = document.getElementById('horloge');
            const maintenant = new Date();
            
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            
            let dateTexte = maintenant.toLocaleDateString('fr-FR', options);
            dateTexte = dateTexte.toUpperCase(); 
            
            // Affichage direct de l'heure sans le mot "HORODATAGE"
            horlogeElement.innerText = dateTexte;
        }

        majHorloge();
        setInterval(majHorloge, 1000);
    </script>
</body>
</html>
