<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>Enregistrement Pathogène</title></head>
<body>
    <div class="container">
        <h1>NOUVEAU PATHOGÈNE</h1>
        <div class="field"><label>Nom</label><input type="text" id="s_nom"></div>
        <div class="field"><label>Type</label><input type="text" id="s_type"></div>
        <div class="field"><label>Origine</label><input type="text" id="s_origine"></div>
        <div class="field"><label>Dangerosité</label><input type="text" id="s_danger"></div>
        <div class="field"><label>URL Image</label><input type="text" id="s_img"></div>
        <div class="field"><label>Description</label><textarea id="s_desc" rows="5"></textarea></div>
        <button onclick="publierSouche()">VALIDER DANS LA BASE</button>
    </div>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function publierSouche() {
            const dataForm = {
                nom: document.getElementById('s_nom').value,
                type: document.getElementById('s_type').value,
                origine: document.getElementById('s_origine').value,
                dangerosite: document.getElementById('s_danger').value,
                image_url: document.getElementById('s_img').value,
                description: document.getElementById('s_desc').value
            };
            const { error } = await supabase.from('souches').insert([dataForm]);
            if (error) { alert("ERREUR: " + error.message); }
            else { alert("SUCCÈS: Pathogène enregistré."); }
        }
    </script>
</body>
</html>
